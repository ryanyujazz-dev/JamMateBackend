[project]
name = "jammate-engine"
version = "2.3.16"
description = "JamMatePyEngineV2 Project Cleanup and README Consolidation"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.110",
  "uvicorn>=0.27",
  "pydantic>=2.6",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
