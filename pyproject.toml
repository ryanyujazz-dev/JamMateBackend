[project]
name = "jammate-engine"
version = "2.4.0"
description = "JamMatePyEngineV2 Harness Hardening and Changelog Split"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.110",
  "uvicorn>=0.27",
  "pydantic>=2.6",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
